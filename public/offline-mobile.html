<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TVIRS Offline</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.25rem;
            background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: #0f172a;
        }

        .card {
            width: min(100%, 380px);
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 22px;
            padding: 1.4rem 1.25rem;
            box-shadow: 0 16px 40px rgba(30, 64, 175, .14);
        }

        .icon {
            width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        h1 {
            margin: 0 0 .45rem;
            font-size: 1.08rem;
        }

        p {
            margin: 0 0 .8rem;
            line-height: 1.55;
            color: #475569;
            font-size: .92rem;
        }

        .note {
            padding: .8rem .9rem;
            border-radius: 14px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
            font-size: .86rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">+</div>
        <h1>You are offline</h1>
        <p>TVIRS mobile can keep already opened officer pages available offline, and queued form submissions will sync automatically once the device reconnects.</p>
        <div class="note">Reconnect to load uncached pages or to finish publishing queued records.</div>
    </div>
</body>
</html>
